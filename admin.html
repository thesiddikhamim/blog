<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Md Abu Bakkar Siddik Hamim</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Serif+4:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <style>
        .admin-header {
            padding: 4rem 0 2rem 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 3rem;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
        }

        .upload-container {
            background: var(--bg-secondary);
            padding: 3rem;
            border: 2px dashed var(--border);
            text-align: center;
            transition: all 0.3s ease;
            position: sticky;
            top: 100px;
        }

        .upload-container.dragover {
            border-color: var(--accent);
            background: rgba(0, 0, 0, 0.05);
        }

        .file-input {
            display: none;
        }

        .btn-primary {
            background: var(--text-primary);
            color: var(--bg-primary);
            padding: 0.75rem 1.5rem;
            border: none;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            display: inline-block;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-delete {
            background: #e74c3c;
            color: white;
            padding: 0.4rem 0.8rem;
            font-size: 0.75rem;
            border: none;
            cursor: pointer;
        }

        #status-message {
            margin-top: 2rem;
            padding: 1rem;
            display: none;
        }

        .success {
            color: #2ecc71;
        }

        .error {
            color: #e74c3c;
        }

        .file-list {
            text-align: left;
            margin-top: 2rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .posts-list {
            list-style: none;
        }

        .post-management-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border);
        }

        .post-management-info h4 {
            margin-bottom: 0.25rem;
            font-size: 1rem;
        }

        .post-management-info small {
            color: var(--text-secondary);
        }

        .post-link {
            text-decoration: none;
            color: inherit;
            flex-grow: 1;
            transition: opacity 0.2s;
        }

        .post-link:hover {
            opacity: 0.7;
        }

        @media (max-width: 900px) {
            .admin-grid {
                grid-template-columns: 1fr;
            }

            .upload-container {
                position: static;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="nav-brand">Hamim</a>
                <ul class="nav-links">
                    <li><a href="index.html">View Site</a></li>
                </ul>
                <div class="nav-controls">
                    <button id="theme-toggle" title="Toggle Dark/Light Mode"></button>
                </div>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="admin-header">
            <h1>Admin Dashboard</h1>
            <p>Manage your writings and publish new articles.</p>
        </section>

        <div class="admin-grid">
            <!-- Upload Section -->
            <section class="upload-section">
                <h2>Publish New Article</h2>
                <div id="drop-zone" class="upload-container">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"
                        stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 1rem; opacity: 0.5;">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <h3>Drag & Drop Files</h3>
                    <p>Upload <strong>.md</strong> and all images (including cover).</p>
                    <input type="file" id="file-input" class="file-input" multiple accept=".md,image/*">
                    <button class="btn-primary" onclick="document.getElementById('file-input').click()">Select
                        Files</button>
                    <div id="file-list" class="file-list"></div>
                </div>

                <div style="text-align: center; margin-top: 2rem;">
                    <button id="publish-btn" class="btn-primary"
                        style="display: none; background: var(--accent); color: white;">Publish Article</button>
                    <div id="status-message"></div>
                </div>
            </section>

            <!-- Management Section -->
            <section class="management-section">
                <h2>Your Writings</h2>
                <div id="posts-list-container" class="posts-list">
                    <p>Loading writings...</p>
                </div>
            </section>
        </div>
    </main>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const fileList = document.getElementById('file-list');
        const publishBtn = document.getElementById('publish-btn');
        const statusMessage = document.getElementById('status-message');
        const postsListContainer = document.getElementById('posts-list-container');

        let selectedFiles = [];

        // Initial Load of Posts
        async function loadPosts() {
            try {
                const url = '/posts';
                console.log('Fetching:', url);
                const response = await fetch(url);
                if (!response.ok) throw new Error('Fetch failed: ' + response.statusText + ' at ' + response.url);
                const posts = await response.json();
                renderPostsList(posts);
            } catch (error) {
                console.error('loadPosts error:', error);
                postsListContainer.innerHTML = `<p class="error">Error loading writings: ${error.message}</p>`;
            }
        }

        function renderPostsList(posts) {
            if (posts.length === 0) {
                postsListContainer.innerHTML = '<p>No writings yet.</p>';
                return;
            }

            postsListContainer.innerHTML = posts.map(post => `
                <div class="post-management-item">
                    <a href="post.html?id=${post.id}" target="_blank" class="post-link">
                        <div class="post-management-info">
                            <h4>#${post.id}: ${post.title}</h4>
                            <small>${post.category} • ${new Date(post.date).toLocaleDateString()}</small>
                        </div>
                    </a>
                    <button class="btn-delete" onclick="deletePost(${post.id})">Delete</button>
                </div>
            `).join('');
        }

        async function deletePost(id) {
            if (!confirm('Are you sure you want to delete this writing?')) return;

            try {
                const response = await fetch(`/posts/${id}`, {
                    method: 'DELETE'
                });
                const result = await response.json();
                if (result.success) {
                    loadPosts();
                }
            } catch (error) {
                alert('Delete failed.');
            }
        }

        // Drag & Drop Handlers
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
        });

        dropZone.addEventListener('drop', handleDrop, false);
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files), false);

        function handleDrop(e) {
            handleFiles(e.dataTransfer.files);
        }

        function handleFiles(files) {
            // Reset for new selection if desired, or append
            selectedFiles = [...selectedFiles, ...Array.from(files)];
            updateFileList();
            publishBtn.style.display = 'inline-block';
        }

        function updateFileList() {
            fileList.innerHTML = '<strong>Files selected:</strong><br>' +
                selectedFiles.map(f => `• ${f.name}`).join('<br>');
        }

        publishBtn.addEventListener('click', async () => {
            const markdownFile = selectedFiles.find(f => f.name.endsWith('.md'));
            const images = selectedFiles.filter(f => !f.name.endsWith('.md'));

            if (!markdownFile) {
                showStatus('Please include a .md file.', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('markdown', markdownFile);
            images.forEach(img => formData.append('images', img));

            try {
                publishBtn.disabled = true;
                publishBtn.textContent = 'Publishing...';

                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    showStatus('Published successfully!', 'success');
                    selectedFiles = [];
                    updateFileList();
                    publishBtn.style.display = 'none';
                    loadPosts(); // Refresh list
                } else {
                    showStatus('Error: ' + result.message, 'error');
                }
            } catch (error) {
                showStatus('Upload failed. Is the server running?', 'error');
            } finally {
                publishBtn.disabled = false;
                publishBtn.textContent = 'Publish Article';
            }
        });

        function showStatus(msg, type) {
            statusMessage.textContent = msg;
            statusMessage.style.display = 'block';
            statusMessage.className = type;
            setTimeout(() => statusMessage.style.display = 'none', 5000);
        }

        // Initialize
        loadPosts();
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="scripts.js"></script>
</body>

</html>
